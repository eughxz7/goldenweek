<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Week - Painel Oficial</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c5a059">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Courier+Prime:wght@700&family=JetBrains+Mono:wght@700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Golden Week</h1>

    <div class="display-operacional">
        <span id="txtDisplayStatus">Aguardando Banca Inicial</span>
        <div class="valor-sinal" id="displayAposta">R$ 0,00</div>
        <div class="info-rodada" id="displayInfo">Insira o valor da sua banca abaixo para iniciar</div>
    </div>

    <div class="botoes-comando">
        <button class="btn btn-win" onclick="registrarResultado(true)">✓ WIN (Bateu)</button>
        <button class="btn btn-red" onclick="registrarResultado(false)">✗ RED (Ir p/ Próxima)</button>
    </div>

    <div class="top-controls">
        <div class="input-group">
            <label for="bancaAtual">Banca Inicial de Operação</label>
            <input type="number" id="bancaAtual" value="0.00" step="0.01" oninput="resetarPainelCompleto()">
            
            <div class="switch-container">
                <span class="switch-label">Travar no Stop Loss (-20%)</span>
                <label class="switch">
                    <input type="checkbox" id="usarStopLoss" checked onchange="calcularEstrategia()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="summary-grid">
            <div class="summary-box box-meta">
                <span>Meta Proposta (+5%)</span>
                <strong id="lblMeta">R$ 0,00</strong>
            </div>
            <div class="summary-box box-stop">
                <span>Piso do Stop Loss</span>
                <strong id="lblStop">R$ 0,00</strong>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nº</th>
                    <th>Apostar (Branco)</th>
                    <th>Perda Acum.</th>
                    <th>Banca Se Perder</th>
                    <th>Banca Se Acertar</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
        </table>
    </div>
</div>

    <script src="script.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log('Aplicativo Golden Week Pronto!'))
            .catch(err => console.log('Erro ao registrar app:', err));
        }
    </script>
</body>
</html>
